name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/tests/Piedrazul.Domain.Tests/Piedrazul.Domain.Tests.csproj

      - name: Test with coverage
        run: dotnet test backend/tests/Piedrazul.Domain.Tests/Piedrazul.Domain.Tests.csproj --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: TestResults/**/coverage.cobertura.xml
